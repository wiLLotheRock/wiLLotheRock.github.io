<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz cumple c:</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Nunito+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="night-stars" aria-hidden="true">
      <img class="star star-lg s1" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s2" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s3" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s4" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-lg s5" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s6" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-xs s7" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s8" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s9" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-lg s10" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s11" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-xs s12" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s13" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s14" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-lg s15" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-xs s16" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s17" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s18" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-lg s19" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-sm s20" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-md s21" src="extras/imagenes/estrella.gif" alt="" />
      <img class="star star-xs s22" src="extras/imagenes/estrella.gif" alt="" />
    </div>

    <!-- Portada (libro cerrado) -->
    <div class="book-cover" id="bookCover">
      <span class="cover-ornament" aria-hidden="true">✦</span>
      <p class="cover-kicker">Regalo de cumpleaños</p>
      <h1 class="cover-title">Para Daniela</h1>
      <span class="cover-rule" aria-hidden="true"></span>
      <p class="cover-subtitle">Una carta hecha libro</p>
      <button id="openBookBtn" type="button">Abrir &rarr;</button>
    </div>

    <!-- Libro abierto -->
    <main class="book-shell" id="bookShell" hidden>
      <section class="book" aria-live="polite">
        <article class="page" id="textPanel">
          <span class="page-ornament" aria-hidden="true">✦</span>
          <p id="pageBody"></p>
          <p id="pageBody2"></p>
          <p class="page-number" id="pageNumber"></p>
        </article>

        <aside class="media-panel" id="mediaPanel">
          <img id="mediaImage" alt="Recuerdo" hidden />
          <video id="mediaVideo" muted loop playsinline hidden></video>
          <p class="media-caption" id="mediaCaption"></p>
        </aside>
      </section>

      <nav class="controls" aria-label="Controles de navegacion">
        <button id="prevBtn" type="button">&larr; Anterior</button>
        <span class="page-counter" id="pageCounter" aria-live="polite"></span>
        <button id="nextBtn" type="button">Siguiente &rarr;</button>
      </nav>
    </main>

    <!-- Musica de fondo -->
    <audio id="bgMusic" src="extras/musica/clinical.mp3" loop></audio>

    <!-- Boton silencio (aparece solo al abrir el libro) -->
    <button
      id="muteBtn"
      type="button"
      aria-label="Silenciar musica"
      hidden
    >🎵</button>

    <!-- Visor en grande para imagen/video -->
    <div
      class="media-lightbox"
      id="mediaLightbox"
      role="dialog"
      aria-label="Vista ampliada"
      aria-hidden="true"
      hidden
    >
      <button id="lightboxCloseBtn" type="button" aria-label="Cerrar vista ampliada">×</button>
      <div class="media-lightbox-content" id="lightboxContent">
        <img id="lightboxImage" alt="Recuerdo en grande" hidden />
        <video id="lightboxVideo" controls playsinline hidden></video>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
